# config/themes/_shared_analyse.yaml
#
# Shared analysis configuration used by all themes.
# Individual themes override specific fields via _analyse_overrides
# (e.g. parser.narrative_mode, parser.theme, figure toggles).

output:
  dir: output
  formats: [md, html]
  lang: zh
  save_figures: true
  save_timeseries: true
  save_features_json: true

feature:
  enabled: true
  layer_idx: 0
  include_trends: true

parser:
  enabled: false          # enable at runtime when api_key is available
  api_key: ""
  model: gpt-4o
  base_url:
  lang: zh
  fmt: md
  sections: [opinion, spatial, topo, event]
  include_executive_summary: true
  max_tokens: 2048
  narrative_mode: diagnostic   # default; overridden per theme
  theme:                       # null = auto-detect; themes supply a concrete value

report:
  enabled: true
  formats: [md, html]
  include_toc: true
  include_meta: true
  include_snapshot: true
  title:

visual:
  enabled: true
  dashboard: true
  opinion_distribution: true
  spatial_opinions: true
  opinion_timeseries: true
  impact_heatmap: false
  event_timeline: true
  polarization_evolution: true
  network_homophily: false
  dpi: 150

simulation_meta: {}

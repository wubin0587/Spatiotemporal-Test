# config/themes/disaster_emergency.yaml
#
# Scenario: natural disaster / sudden public emergency
#
# Key characteristics:
#   - Strong exogenous shock (disaster event) hits suddenly at very high intensity
#   - Post-shock opinion first converges (solidarity effect), then re-diverges (blame attribution)
#   - Spatial layout: disaster epicenter (high density) + surrounding areas (low density)
#   - Official information competes with grassroots rumors
#   - Research focus: full shock->convergence->re-divergence cycle; spatial heterogeneity

_meta:
  label: Natural Disaster / Public Emergency
  description: >
    Sudden disaster emergency scenario. A high-intensity shock triggers a
    solidarity-then-blame cycle. Epicenter vs. periphery dynamics differ
    markedly. Designed to study crisis communication and spatial asymmetry.
  scenario: disaster_emergency
  tags: [disaster, emergency, spatial_heterogeneity, recovery]

_presets:
  networks.builder:       small_world
  spatial.distributions:  radial_decay      # dense epicenter, sparse periphery
  engine.interface:       uniform

engine:
  interface:
    agents:
      num_agents: 400
      opinion_layers: 2
      initial_opinions:
        params: {}
    simulation:
      total_steps: 500
      seed: 1111
  maths:
    dynamics:
      kernel: dw
      epsilon_base: 0.38
      mu_base: 0.42
      alpha_mod: 0.50
      beta_mod: 0.20
      backfire: false
      repulsion_rate: 0.01
    field:
      alpha: 4.0
      beta: 0.05
      temporal_window: 120.0
    topo:
      threshold: 0.35
      radius_base: 0.07
      radius_dynamic: 0.18
networks:
  builder:
    params:
      n: 400
      k: 10
      p: 0.12
spatial:
  distribution:
    center: [0.5, 0.5]
    max_radius: 0.5
    strength: 2.5
events:
  generation:
    exogenous:
      enabled: true
      seed: 1111
      time_trigger:
        lambda_rate: 0.06
      attributes:
        intensity:
          type: pareto
          shape: 1.5
          min_val: 4.0
        polarity:
          min: -0.4
          max: 0.4
        lifecycle:
          fast_prob: 0.5
          fast_range: [3, 10]
          slow_range: [20, 60]
    endogenous_threshold:
      enabled: true
      monitor_attribute: density
      critical_threshold: 0.45
      grid_resolution: 18
      min_agents_in_cell: 4
      cooldown: 20
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.60
      background_lambda: 0.01
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: chronicle
  parser.theme: disaster_emergency
  visual.impact_heatmap: true
  visual.spatial_opinions: true
  report.title: Disaster Emergency — Spatiotemporal Sentiment Dynamics

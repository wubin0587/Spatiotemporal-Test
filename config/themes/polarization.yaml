# config/themes/polarization.yaml
#
# Scenario: chronic societal polarization (slow, structural)
#
# Key characteristics:
#   - Opinion distribution evolves from unimodal to stable bimodal over time
#   - Intra-cell variance triggers events in ideologically mixed zones
#   - Network homophily intensifies as agents selectively connect
#   - No single dramatic trigger; driven by cumulative drift
#   - Research focus: bifurcation conditions, stable bimodal state, bridge-breaking interventions

_meta:
  label: Chronic Societal Polarization
  description: >
    Long-run structural polarization. Initial opinions are moderately dispersed
    and evolve into a stable bimodal distribution. Designed to study bifurcation
    conditions and the effectiveness of network rewiring interventions.
  scenario: polarization
  tags: [polarization, bimodal, long_run, network_homophily]

_presets:
  networks.builder:       small_world
  spatial.distributions:  gaussian
  engine.interface:       normal

engine:
  interface:
    agents:
      num_agents: 400
      opinion_layers: 2
      initial_opinions:
        params:
          mean: 0.5
          std: 0.22
    simulation:
      total_steps: 1000
      seed: 505
  maths:
    dynamics:
      kernel: dw
      epsilon_base: 0.22
      mu_base: 0.28
      alpha_mod: 0.20
      beta_mod: 0.12
      backfire: false
      repulsion_rate: 0.01
    field:
      alpha: 5.0
      beta: 0.07
      temporal_window: 200.0
    topo:
      threshold: 0.22
      radius_base: 0.06
      radius_dynamic: 0.15
networks:
  builder:
    params:
      n: 400
      k: 8
      p: 0.08
spatial:
  distribution:
    mean: [0.5, 0.5]
    std_dev: [0.20, 0.20]
events:
  generation:
    endogenous_threshold:
      enabled: true
      monitor_attribute: opinion_variance
      critical_threshold: 0.45
      grid_resolution: 15
      min_agents_in_cell: 5
      cooldown: 40
      attributes:
        intensity:
          base_value: 10.0
          scale_factor: 12.0
        content:
          amplify_dominant: false
    exogenous:
      enabled: true
      seed: 505
      time_trigger:
        lambda_rate: 0.15
      attributes:
        intensity:
          min_val: 3.0
        lifecycle:
          fast_prob: 0.75
          fast_range: [3, 8]
          slow_range: [20, 50]
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.50
      background_lambda: 0.0
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: predictive
  parser.theme: polarization
  visual.network_homophily: true     # homophily index is key for this scenario
  report.title: Chronic Societal Polarization Dynamics Analysis

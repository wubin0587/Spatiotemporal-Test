# config/themes/election.yaml
#
# Scenario: opinion dynamics during an election campaign
#
# Key characteristics:
#   - Clear temporal structure: campaign -> debate/scandal shocks -> election day
#   - Opinions oscillate on a continuous axis (support rate), not simple polarization
#   - External events have discrete time anchors (debates, scandals, poll releases)
#   - Undecided (center) voters are most sensitive to event shocks
#   - Research focus: impact magnitude of key events, undecided voter trajectories

_meta:
  label: Election Campaign Opinion Dynamics
  description: >
    Election campaign scenario with discrete shock events (debates, scandals).
    Focus on swing-voter trajectories and the quantified impact of each event.
    Heavy-tailed intensity distribution captures rare but decisive moments.
  scenario: election
  tags: [election, opinion_dynamics, swing_voters, event_driven]

_presets:
  networks.builder:       small_world
  spatial.distributions:  gaussian
  engine.interface:       normal

engine:
  interface:
    agents:
      num_agents: 400
      opinion_layers: 2
      initial_opinions:
        params:
          mean: 0.5
          std: 0.25
    simulation:
      total_steps: 600
      seed: 707
  maths:
    dynamics:
      epsilon_base: 0.28
      mu_base: 0.32
      alpha_mod: 0.30
      beta_mod: 0.15
      backfire: false
      backfire_strength: 0.01
    field:
      alpha: 6.0
      beta: 0.08
      temporal_window: 150.0
    topo:
      threshold: 0.28
      radius_base: 0.06
      radius_dynamic: 0.15
networks:
  builder:
    params:
      n: 400
      k: 10
      p: 0.10
events:
  generation:
    exogenous:
      enabled: true
      seed: 707
      time_trigger:
        type: poisson
        lambda_rate: 0.15
      attributes:
        intensity:
          type: pareto
          shape: 1.8   # heavy tail: rare super-events
          min_val: 5.0
        polarity:
          min: -0.9
          max: 0.9
        lifecycle:
          fast_prob: 0.6
          fast_range: [5, 20]
          slow_range: [30, 80]
    endogenous_threshold:
      enabled: true
      monitor_attribute: opinion_extremism
      critical_threshold: 0.55
      grid_resolution: 15
      min_agents_in_cell: 5
      cooldown: 35
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.55
      background_lambda: 0.01
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: chronicle
  parser.theme: election
  report.title: Election Campaign Opinion Dynamics Analysis

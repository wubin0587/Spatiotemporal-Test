# config/themes/political_rally.yaml
#
# Scenario: political rally / campaign event
#
# Key characteristics:
#   - Attendees arrive already highly polarized (supporters vs. opponents)
#   - External speech events carry strong, directional polarity
#   - Strong in-group homophily; inter-group contact minimal (echo chamber)
#   - Moderate cascade (chanting, emotional escalation)
#   - Research focus: polarization deepening, backfire effect, rare opinion flips

_meta:
  label: Political Rally / Campaign Event
  description: >
    Political campaign rally. Attendees are pre-polarized; speech events carry
    strong directional polarity; in-group pressure reinforces existing views.
    Polarization intensifies over time with a clear echo-chamber structure.
  scenario: political_rally
  tags: [politics, polarization, echo_chamber, high_intensity]

_presets:
  networks.builder:       small_world
  spatial.distributions:  segregated
  engine.interface:       polarized

engine:
  interface:
    agents:
      num_agents: 400
      opinion_layers: 3
      initial_opinions:
        params:
          split: 0.5
    simulation:
      total_steps: 500
      seed: 202
  maths:
    dynamics:
      epsilon_base: 0.18
      mu_base: 0.30
      alpha_mod: 0.35
      beta_mod: 0.20
      backfire: true
    field:
      alpha: 6.0
      beta: 0.08
      temporal_window: 120.0
    topo:
      threshold: 0.20
      radius_base: 0.05
      radius_dynamic: 0.12
networks:
  builder:
    params:
      n: 400
      k: 8
      p: 0.05
spatial:
  distribution:
    type: segregated
events:
  generation:
    exogenous:
      enabled: true
      seed: 202
      time_trigger:
        type: poisson
        lambda_rate: 0.20
      attributes:
        intensity:
          type: pareto
          shape: 2.5
          min_val: 8.0
        polarity:
          type: uniform
          min: -1.0
          max: 1.0
        lifecycle:
          type: bimodal
          fast_prob: 0.7
          fast_range: [5, 15]
          slow_range: [20, 50]
    endogenous_threshold:
      enabled: true
      monitor_attribute: opinion_extremism
      critical_threshold: 0.65
      grid_resolution: 15
      min_agents_in_cell: 5
      cooldown: 30
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.55
      background_lambda: 0.0
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: diagnostic
  parser.theme: political_rally
  report.title: Political Rally Opinion Polarization Analysis

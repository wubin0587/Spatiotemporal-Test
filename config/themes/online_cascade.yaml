# config/themes/online_cascade.yaml
#
# Scenario: information cascade / viral spread on social media
#
# Key characteristics:
#   - Scale-free network: a few super-nodes (influencers/KOLs) dominate propagation
#   - Cascade generator is the core mechanism (Hawkes process models retweet chains)
#   - Space is irrelevant (purely online); multi-dimensional opinion topics
#   - Extremely fast propagation; short lifecycles (72-hour trending window)
#   - Research focus: super-node removal effect, cascade criticality, topic competition

_meta:
  label: Social Media Information Cascade / Viral Spread
  description: >
    Social media viral spreading scenario. Influencer nodes in a scale-free
    network trigger Hawkes-process cascades. Near-critical mu_multiplier enables
    supercritical cascade experiments. Research hub-removal and criticality.
  scenario: online_cascade
  tags: [social_media, viral, cascade, scale_free, hawkes]

_presets:
  networks.builder:       barabasi_albert
  spatial.distributions:  uniform          # online; space is irrelevant
  engine.interface:       uniform

engine:
  interface:
    agents:
      num_agents: 500
      opinion_layers: 4   # multi-topic dimensions
      initial_opinions:
        params: {}
    simulation:
      total_steps: 300
      seed: 909
  maths:
    dynamics:
      epsilon_base: 0.35
      mu_base: 0.50
      alpha_mod: 0.55
      beta_mod: 0.30
      backfire: false
      backfire_strength: 0.01
    field:
      alpha: 10.0
      beta: 0.15
      temporal_window: 50.0
    topo:
      threshold: 0.40
      radius_base: 0.10
      radius_dynamic: 0.25
networks:
  builder:
    params:
      n: 500
      m: 5
events:
  generation:
    exogenous:
      enabled: true
      seed: 909
      time_trigger:
        lambda_rate: 0.08
      attributes:
        intensity:
          type: pareto
          shape: 1.5   # extreme heavy tail
          min_val: 8.0
        lifecycle:
          fast_prob: 0.95
          fast_range: [1, 3]
          slow_range: [5, 12]
    endogenous_threshold:
      enabled: false
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.85
      background_lambda: 0.05   # persistent organic posting
      attributes:
        intensity:
          cascade_decay: 0.4
        diffusion:
          inherit_from_parent: true
          spatial_mutation: 0.02
    online_resonance:
      enabled: true
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: predictive
  parser.theme: online_cascade
  visual.event_timeline: true
  report.title: Social Media Information Cascade Analysis

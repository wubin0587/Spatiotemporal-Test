# config/themes/concert.yaml
#
# Scenario: open-air concert / music festival
#
# Key characteristics:
#   - Large dense crowd; highly clustered spatial distribution
#   - High emotional arousal; opinions converge quickly (wide epsilon, high mu)
#   - Frequent high-intensity external events (set changes, fireworks, incidents)
#   - Active cascade spreading (emotional contagion between attendees)
#   - Low radicalization risk; short-lived but strong impulse impacts
#   - Event lifecycle dominated by brief bursts

_meta:
  label: Concert / Music Festival
  description: >
    Large open-air concert or festival. Crowd is densely clustered and highly
    synchronized emotionally. External events (performances, fireworks) drive
    short strong impulses; opinions converge rapidly.
  scenario: concert_crowd
  tags: [crowd, entertainment, high_density, short_burst]

_presets:
  networks.builder:       small_world
  spatial.distributions:  clustered
  engine.interface:       polarized     # some initial spread; converges quickly

engine:
  interface:
    agents:
      num_agents: 500
      opinion_layers: 2
      initial_opinions:
        params:
          split: 0.5
    simulation:
      total_steps: 300
      seed: 101
  maths:
    dynamics:
      kernel: dw
      epsilon_base: 0.40
      mu_base: 0.45
      alpha_mod: 0.30
      beta_mod: 0.10
      backfire: false
      repulsion_rate: 0.01
    field:
      alpha: 8.0
      beta: 0.10
      temporal_window: 60.0
    topo:
      threshold: 0.35
      radius_base: 0.04
      radius_dynamic: 0.10
networks:
  builder:
    params:
      n: 500
      k: 10
      p: 0.15
spatial:
  distribution:
    n_clusters: 3
    cluster_std: 0.07
events:
  generation:
    exogenous:
      enabled: true
      seed: 201
      time_trigger:
        type: poisson
        lambda_rate: 0.50
      attributes:
        intensity:
          type: pareto
          shape: 2.0
          min_val: 6.0
        lifecycle:
          type: bimodal
          fast_prob: 0.95
          fast_range: [1, 4]
          slow_range: [8, 15]
    endogenous_threshold:
      enabled: true
      monitor_attribute: density
      critical_threshold: 0.55
      grid_resolution: 20
      min_agents_in_cell: 6
      cooldown: 15
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.7
      background_lambda: 0.0
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: dramatic
  parser.theme: concert_crowd
  report.title: Concert Crowd Sentiment Dynamics

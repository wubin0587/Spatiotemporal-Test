# config/themes/deradicalization.yaml
#
# Scenario: de-radicalization intervention experiment
#
# Key characteristics:
#   - Initial state: already-polarized population (bimodal opinions)
#   - Focus is on interventions: multiple de-rad policies compared
#   - Intervention timing study: early vs. mid vs. late
#   - auto_checkpoint enabled for all rules to support counterfactual comparison
#   - Research focus: which intervention is most effective, side-effects (over-convergence)

_meta:
  label: De-radicalization Intervention Experiment
  description: >
    Policy evaluation scenario. System starts polarized; three intervention
    rules (network rewiring, opinion nudge, event suppression) run with
    auto_checkpoint enabled for counterfactual analysis.
  scenario: deradicalization
  tags: [intervention, deradicalization, counterfactual, policy]

_presets:
  networks.builder:       small_world
  spatial.distributions:  clustered
  engine.interface:       polarized

engine:
  interface:
    agents:
      num_agents: 300
      opinion_layers: 2
      initial_opinions:
        params:
          split: 0.5
    simulation:
      total_steps: 600
      seed: 1010
  maths:
    dynamics:
      epsilon_base: 0.20
      mu_base: 0.30
      alpha_mod: 0.25
      beta_mod: 0.15
      backfire: false
      backfire_strength: 0.01
    field:
      alpha: 5.5
      beta: 0.07
      temporal_window: 150.0
    topo:
      threshold: 0.22
      radius_base: 0.06
      radius_dynamic: 0.14
networks:
  builder:
    params:
      n: 300
      k: 8
      p: 0.08
spatial:
  distribution:
    n_clusters: 4
    cluster_std: 0.10
events:
  generation:
    exogenous:
      enabled: true
      seed: 1010
      time_trigger:
        lambda_rate: 0.12
      attributes:
        intensity:
          min_val: 3.0
        lifecycle:
          fast_prob: 0.80
          fast_range: [2, 6]
          slow_range: [10, 25]
    endogenous_threshold:
      enabled: true
      monitor_attribute: opinion_extremism
      critical_threshold: 0.65
      grid_resolution: 15
      min_agents_in_cell: 4
      cooldown: 35
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.55
      background_lambda: 0.0
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
intervention:
  interventions: 
- label: suppress_extreme_events
auto_checkpoint: false
trigger: 
type: event_suppress
step: 100
max_fires: 0
policy: 
fraction: 0.15
seed: 42
threshold: 0.40
cooldown: 20
layer: -1
delta: 0.05
direction: center
source: endogenous_threshold
duration: 15
_analyse_overrides:
  parser.narrative_mode: comparative
  parser.theme: deradicalization
  visual.network_homophily: true
  visual.polarization_evolution: true
  report.title: De-radicalization Intervention — Comparative Analysis

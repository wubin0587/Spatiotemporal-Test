# config/themes/urban_crowd.yaml
#
# Scenario: urban crowd gathering (commercial district / holiday / sporting event)
#
# Key characteristics:
#   - Complex spatial layout: city core + satellite commercial zones
#   - High mobility; chance encounters dominate (weak-tie network)
#   - Moderate-intensity events with short lifecycles (transient hotspots)
#   - Opinions dispersed, no strong polarization trend (background-noise scenario)
#   - Research focus: crowd density hotspot dynamics, spatial event distribution, weak-tie propagation

_meta:
  label: Urban Crowd Gathering
  description: >
    City holiday or major event crowd scenario. Satellite spatial structure;
    weak-tie encounters dominate. Designed to study transient hotspot formation
    and information spread through incidental contact.
  scenario: urban_crowd
  tags: [urban, crowd, spatial, weak_ties, daily_life]

_presets:
  networks.builder:       random_geometric   # geographically proximate connections
  spatial.distributions:  satellite
  engine.interface:       uniform

_overrides:
  engine.interface.agents.num_agents:        600
  engine.interface.agents.opinion_layers:    2
  engine.interface.agents.initial_opinions.params: {}

  engine.interface.simulation.total_steps:   400
  engine.interface.simulation.seed:          808

  engine.maths.dynamics.epsilon_base:   0.35
  engine.maths.dynamics.mu_base:        0.25
  engine.maths.dynamics.alpha_mod:      0.20
  engine.maths.dynamics.beta_mod:       0.10
  engine.maths.dynamics.backfire:       false

  engine.maths.field.alpha:             7.0
  engine.maths.field.beta:              0.10
  engine.maths.field.temporal_window:   80.0

  engine.maths.topo.threshold:          0.35
  engine.maths.topo.radius_base:        0.05
  engine.maths.topo.radius_dynamic:     0.12

  networks.builder.params.n:      600
  networks.builder.params.radius: 0.06

  # spatial: main city core + two satellite commercial zones
  spatial.distribution.main_city.center:     [0.52, 0.52]
  spatial.distribution.main_city.proportion: 0.65
  spatial.distribution.main_city.std_dev:    0.12
  spatial.distribution.satellites:
    - center: [0.18, 0.75]
      proportion: 0.20
      std_dev: 0.06
    - center: [0.80, 0.25]
      proportion: 0.15
      std_dev: 0.05

  # exogenous: moderate-frequency, short-lived trending moments
  events.generation.exogenous.enabled:  true
  events.generation.exogenous.seed:     808
  events.generation.exogenous.time_trigger.lambda_rate: 0.30
  events.generation.exogenous.attributes.intensity.min_val: 3.0
  events.generation.exogenous.attributes.polarity.min:      -0.3
  events.generation.exogenous.attributes.polarity.max:      0.3
  events.generation.exogenous.attributes.lifecycle.fast_prob:  0.90
  events.generation.exogenous.attributes.lifecycle.fast_range: [1, 5]
  events.generation.exogenous.attributes.lifecycle.slow_range: [8, 20]

  # endogenous threshold: density trigger (spontaneous crowd hotspots)
  events.generation.endogenous_threshold.enabled:            true
  events.generation.endogenous_threshold.monitor_attribute:  density
  events.generation.endogenous_threshold.critical_threshold: 0.50
  events.generation.endogenous_threshold.grid_resolution:    25
  events.generation.endogenous_threshold.min_agents_in_cell: 5
  events.generation.endogenous_threshold.cooldown:           15

  events.generation.endogenous_cascade.enabled:          true
  events.generation.endogenous_cascade.mu_multiplier:    0.45
  events.generation.endogenous_cascade.background_lambda: 0.0

_analyse_overrides:
  parser.narrative_mode: dramatic
  parser.theme: urban_crowd
  visual.impact_heatmap: true
  visual.spatial_opinions: true
  report.title: Urban Crowd Hotspot Dynamics Analysis

# config/themes/political_rally.yaml
#
# 场景：政治集会 / 竞选造势
#
# 特征：
#   - 参与者初始观点已高度极化（支持 vs 反对）
#   - 外部演讲事件强烈且具有明确极性
#   - 群体内部强同质化，群际交流极少（回音壁）
#   - 级联效应中等（口号传播、情绪激化）
#   - 研究关注：极化加剧 vs 偶发的观点转变

_meta:
  label: 政治集会 / 竞选造势
  description: >
    政治集会场景。参与者初始已极化，演讲事件具有强方向性极性，
    群内同质化压力大，群际边界清晰，极化趋势持续加剧。
  scenario: political_rally
  tags: [politics, polarization, echo_chamber, high_intensity]

_presets:
  networks.builder:       small_world
  spatial.distributions:  segregated
  engine.interface:       polarized

_overrides:
  engine.interface.agents.num_agents:        400
  engine.interface.agents.opinion_layers:    3
  engine.interface.agents.initial_opinions.params.split: 0.5

  engine.interface.simulation.total_steps:   500
  engine.interface.simulation.seed:          202

  # 动力学：容忍度低（only talk to like-minded）、更新适中
  engine.maths.dynamics.epsilon_base:   0.18
  engine.maths.dynamics.mu_base:        0.30
  engine.maths.dynamics.alpha_mod:      0.35
  engine.maths.dynamics.beta_mod:       0.20
  engine.maths.dynamics.backfire:       true   # 回火效应：反驳反而强化原立场

  engine.maths.field.alpha:             6.0
  engine.maths.field.beta:              0.08
  engine.maths.field.temporal_window:   120.0

  engine.maths.topo.threshold:          0.20
  engine.maths.topo.radius_base:        0.05
  engine.maths.topo.radius_dynamic:     0.12

  networks.builder.params.n:    400
  networks.builder.params.k:    8
  networks.builder.params.p:    0.05   # 低重连概率 → 更强团簇

  # 空间：明显的群体分隔
  spatial.distribution.type:    segregated

  # 外生事件：演讲（中等频率，强极性）
  events.generation.exogenous.enabled:  true
  events.generation.exogenous.seed:     202
  events.generation.exogenous.time_trigger.type:        poisson
  events.generation.exogenous.time_trigger.lambda_rate: 0.20
  events.generation.exogenous.attributes.intensity.type:      pareto
  events.generation.exogenous.attributes.intensity.shape:     2.5
  events.generation.exogenous.attributes.intensity.min_val:   8.0
  events.generation.exogenous.attributes.polarity.type:       uniform
  events.generation.exogenous.attributes.polarity.min:        -1.0
  events.generation.exogenous.attributes.polarity.max:        1.0
  events.generation.exogenous.attributes.lifecycle.type:      bimodal
  events.generation.exogenous.attributes.lifecycle.fast_prob: 0.7
  events.generation.exogenous.attributes.lifecycle.fast_range: [5, 15]
  events.generation.exogenous.attributes.lifecycle.slow_range: [20, 50]

  # 内生阈值：意见极端化触发
  events.generation.endogenous_threshold.enabled:            true
  events.generation.endogenous_threshold.monitor_attribute:  opinion_extremism
  events.generation.endogenous_threshold.critical_threshold: 0.65
  events.generation.endogenous_threshold.grid_resolution:    15
  events.generation.endogenous_threshold.min_agents_in_cell: 5
  events.generation.endogenous_threshold.cooldown:           30

  events.generation.endogenous_cascade.enabled:          true
  events.generation.endogenous_cascade.mu_multiplier:    0.55
  events.generation.endogenous_cascade.background_lambda: 0.0

_analyse_overrides:
  parser.narrative_mode: diagnostic
  parser.theme: political_rally
  report.title: 政治集会舆论极化动力学分析

# config/themes/protest.yaml
#
# Scenario: street protest / social movement
#
# Key characteristics:
#   - Participants share a grievance but split between moderates and radicals
#   - Density-triggered events (crowd gathering -> confrontation -> conflict)
#   - Police/counter-group actions are exogenous intervention candidates
#   - Spatial dynamics matter: conflict erupts in dense zones, spreads outward
#   - Research focus: radicalization path, spatial diffusion, intervention timing

_meta:
  label: Street Protest / Social Movement
  description: >
    Street protest scenario. Crowd clusters dynamically; density drives
    confrontation events. Internal moderate-radical split evolves over time.
    Designed to study radicalization pathways and intervention timing.
  scenario: protest
  tags: [protest, radicalization, spatial_dynamics, intervention]

_presets:
  networks.builder:       barabasi_albert   # opinion leaders with high degree
  spatial.distributions:  clustered
  engine.interface:       polarized

_overrides:
  engine.interface.agents.num_agents:        350
  engine.interface.agents.opinion_layers:    2
  engine.interface.agents.initial_opinions.params.split: 0.4   # more radicals

  engine.interface.simulation.total_steps:   600
  engine.interface.simulation.seed:          303

  engine.maths.dynamics.epsilon_base:   0.22
  engine.maths.dynamics.mu_base:        0.35
  engine.maths.dynamics.alpha_mod:      0.40
  engine.maths.dynamics.beta_mod:       0.20
  engine.maths.dynamics.backfire:       false

  engine.maths.field.alpha:             5.0
  engine.maths.field.beta:              0.07
  engine.maths.field.temporal_window:   150.0

  engine.maths.topo.threshold:          0.25
  engine.maths.topo.radius_base:        0.06
  engine.maths.topo.radius_dynamic:     0.14

  networks.builder.params.n:  350
  networks.builder.params.m:  4

  spatial.distribution.n_clusters:  5
  spatial.distribution.cluster_std: 0.09

  # exogenous: police announcements / counter-group statements (low freq, high polarity)
  events.generation.exogenous.enabled:  true
  events.generation.exogenous.seed:     303
  events.generation.exogenous.time_trigger.lambda_rate: 0.12
  events.generation.exogenous.attributes.intensity.min_val:   10.0
  events.generation.exogenous.attributes.polarity.min:        -0.8
  events.generation.exogenous.attributes.polarity.max:        0.8
  events.generation.exogenous.attributes.lifecycle.fast_prob: 0.6
  events.generation.exogenous.attributes.lifecycle.fast_range: [3, 8]
  events.generation.exogenous.attributes.lifecycle.slow_range: [15, 40]

  # endogenous threshold: density trigger (crowd surge -> confrontation)
  events.generation.endogenous_threshold.enabled:            true
  events.generation.endogenous_threshold.monitor_attribute:  density
  events.generation.endogenous_threshold.critical_threshold: 0.50
  events.generation.endogenous_threshold.grid_resolution:    20
  events.generation.endogenous_threshold.min_agents_in_cell: 4
  events.generation.endogenous_threshold.cooldown:           25
  events.generation.endogenous_threshold.attributes.intensity.base_value:   12.0
  events.generation.endogenous_threshold.attributes.intensity.scale_factor: 18.0

  events.generation.endogenous_cascade.enabled:          true
  events.generation.endogenous_cascade.mu_multiplier:    0.65
  events.generation.endogenous_cascade.background_lambda: 0.0

_analyse_overrides:
  parser.narrative_mode: chronicle
  parser.theme: protest
  report.title: Street Protest Spatial Dynamics Analysis

# config/themes/urban_crowd.yaml
#
# Scenario: urban crowd gathering (commercial district / holiday / sporting event)
#
# Key characteristics:
#   - Complex spatial layout: city core + satellite commercial zones
#   - High mobility; chance encounters dominate (weak-tie network)
#   - Moderate-intensity events with short lifecycles (transient hotspots)
#   - Opinions dispersed, no strong polarization trend (background-noise scenario)
#   - Research focus: crowd density hotspot dynamics, spatial event distribution, weak-tie propagation

_meta:
  label: Urban Crowd Gathering
  description: >
    City holiday or major event crowd scenario. Satellite spatial structure;
    weak-tie encounters dominate. Designed to study transient hotspot formation
    and information spread through incidental contact.
  scenario: urban_crowd
  tags: [urban, crowd, spatial, weak_ties, daily_life]

_presets:
  networks.builder:       random_geometric   # geographically proximate connections
  spatial.distributions:  satellite
  engine.interface:       uniform

engine:
  interface:
    agents:
      num_agents: 600
      opinion_layers: 2
      initial_opinions:
        params: {}
    simulation:
      total_steps: 400
      seed: 808
  maths:
    dynamics:
      kernel: dw
      epsilon_base: 0.35
      mu_base: 0.25
      alpha_mod: 0.20
      beta_mod: 0.10
      backfire: false
      repulsion_rate: 0.01
    field:
      alpha: 7.0
      beta: 0.10
      temporal_window: 80.0
    topo:
      threshold: 0.35
      radius_base: 0.05
      radius_dynamic: 0.12
networks:
  builder:
    params:
      n: 600
      radius: 0.06
spatial:
  distribution:
    main_city:
      center: [0.52, 0.52]
      proportion: 0.65
      std_dev: 0.12
    satellites: 
- center: [0.80, 0.25]
proportion: 0.15
std_dev: 0.05
events:
  generation:
    exogenous:
      enabled: true
      seed: 808
      time_trigger:
        lambda_rate: 0.30
      attributes:
        intensity:
          min_val: 3.0
        polarity:
          min: -0.3
          max: 0.3
        lifecycle:
          fast_prob: 0.90
          fast_range: [1, 5]
          slow_range: [8, 20]
    endogenous_threshold:
      enabled: true
      monitor_attribute: density
      critical_threshold: 0.50
      grid_resolution: 25
      min_agents_in_cell: 5
      cooldown: 15
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.45
      background_lambda: 0.0
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: dramatic
  parser.theme: urban_crowd
  visual.impact_heatmap: true
  visual.spatial_opinions: true
  report.title: Urban Crowd Hotspot Dynamics Analysis

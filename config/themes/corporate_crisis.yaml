# config/themes/corporate_crisis.yaml
#
# Scenario: corporate PR crisis / brand sentiment
#
# Key characteristics:
#   - Initial opinions normally distributed with positive bias (brand goodwill)
#   - One-off high-intensity negative event (scandal exposure) shifts sentiment negatively
#   - Media/KOL nodes (BA network) dominate the opinion trajectory
#   - Topic lifecycle: short burst -> long-tail fermentation
#   - Research focus: PR response timing, KOL intervention effect, sentiment recovery speed

_meta:
  label: Corporate PR Crisis / Brand Sentiment
  description: >
    Brand crisis scenario. A negative scandal event rapidly degrades sentiment.
    PR responses and KOL interventions compete on a BA influence network.
    Designed to study response timing and sentiment recovery trajectories.
  scenario: corporate_crisis
  tags: [PR, brand, crisis, media, KOL]

_presets:
  networks.builder:       barabasi_albert
  spatial.distributions:  gaussian
  engine.interface:       normal

engine:
  interface:
    agents:
      num_agents: 350
      opinion_layers: 2
      initial_opinions:
        params:
          mean: 0.65   # start with positive bias
          std: 0.15
    simulation:
      total_steps: 400
      seed: 1212
  maths:
    dynamics:
      epsilon_base: 0.32
      mu_base: 0.38
      alpha_mod: 0.40
      beta_mod: 0.18
      backfire: false
    field:
      alpha: 7.0
      beta: 0.10
      temporal_window: 80.0
    topo:
      threshold: 0.30
      radius_base: 0.06
      radius_dynamic: 0.15
networks:
  builder:
    params:
      n: 350
      m: 4
events:
  generation:
    exogenous:
      enabled: true
      seed: 1212
      time_trigger:
        lambda_rate: 0.20
      attributes:
        intensity:
          type: pareto
          shape: 2.0
          min_val: 4.0
        polarity:
          min: -0.9
          max: 0.6   # negative skew after scandal
        lifecycle:
          fast_prob: 0.75
          fast_range: [2, 8]
          slow_range: [15, 40]
    endogenous_threshold:
      enabled: true
      monitor_attribute: opinion_extremism
      critical_threshold: 0.55
      grid_resolution: 12
      min_agents_in_cell: 4
      cooldown: 25
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.65
      background_lambda: 0.02
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: diagnostic
  parser.theme: corporate_crisis
  report.title: Corporate PR Crisis — Brand Sentiment Analysis

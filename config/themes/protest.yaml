# config/themes/protest.yaml
#
# Scenario: street protest / social movement
#
# Key characteristics:
#   - Participants share a grievance but split between moderates and radicals
#   - Density-triggered events (crowd gathering -> confrontation -> conflict)
#   - Police/counter-group actions are exogenous intervention candidates
#   - Spatial dynamics matter: conflict erupts in dense zones, spreads outward
#   - Research focus: radicalization path, spatial diffusion, intervention timing

_meta:
  label: Street Protest / Social Movement
  description: >
    Street protest scenario. Crowd clusters dynamically; density drives
    confrontation events. Internal moderate-radical split evolves over time.
    Designed to study radicalization pathways and intervention timing.
  scenario: protest
  tags: [protest, radicalization, spatial_dynamics, intervention]

_presets:
  networks.builder:       barabasi_albert   # opinion leaders with high degree
  spatial.distributions:  clustered
  engine.interface:       polarized

engine:
  interface:
    agents:
      num_agents: 350
      opinion_layers: 2
      initial_opinions:
        params:
          split: 0.4   # more radicals
    simulation:
      total_steps: 600
      seed: 303
  maths:
    dynamics:
      kernel: dw
      epsilon_base: 0.22
      mu_base: 0.35
      alpha_mod: 0.40
      beta_mod: 0.20
      backfire: false
      repulsion_rate: 0.01
    field:
      alpha: 5.0
      beta: 0.07
      temporal_window: 150.0
    topo:
      threshold: 0.25
      radius_base: 0.06
      radius_dynamic: 0.14
networks:
  builder:
    params:
      n: 350
      m: 4
spatial:
  distribution:
    n_clusters: 5
    cluster_std: 0.09
events:
  generation:
    exogenous:
      enabled: true
      seed: 303
      time_trigger:
        lambda_rate: 0.12
      attributes:
        intensity:
          min_val: 10.0
        polarity:
          min: -0.8
          max: 0.8
        lifecycle:
          fast_prob: 0.6
          fast_range: [3, 8]
          slow_range: [15, 40]
    endogenous_threshold:
      enabled: true
      monitor_attribute: density
      critical_threshold: 0.50
      grid_resolution: 20
      min_agents_in_cell: 4
      cooldown: 25
      attributes:
        intensity:
          base_value: 12.0
          scale_factor: 18.0
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.65
      background_lambda: 0.0
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: chronicle
  parser.theme: protest
  report.title: Street Protest Spatial Dynamics Analysis

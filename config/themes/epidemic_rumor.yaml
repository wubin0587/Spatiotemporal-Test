# config/themes/epidemic_rumor.yaml
#
# Scenario: rumor spread during a public health crisis
#
# Key characteristics:
#   - Information vacuum triggers large rumor cascades (cascade generator is central)
#   - Panic drives rapid opinion polarization (believe vs. disbelieve)
#   - Official corrections are exogenous events competing with rumors
#   - Time structure shows "rumor burst -> correction -> partial recovery" waves
#   - Research focus: rumor lifecycle, optimal correction timing, health literacy moderation

_meta:
  label: Public Health Crisis — Rumor Spread
  description: >
    Public health crisis information scenario. Information asymmetry triggers
    Hawkes-process rumor cascades that compete with official corrections.
    Designed to study intervention timing and information literacy effects.
  scenario: epidemic_rumor
  tags: [rumor, public_health, cascade, information_competition]

_presets:
  networks.builder:       small_world
  spatial.distributions:  gaussian
  engine.interface:       uniform       # start uniform; crisis shock induces polarization

engine:
  interface:
    agents:
      num_agents: 500
      opinion_layers: 3
      initial_opinions:
        params: {}
    simulation:
      total_steps: 500
      seed: 606
  maths:
    dynamics:
      epsilon_base: 0.30
      mu_base: 0.40
      alpha_mod: 0.50
      beta_mod: 0.25
      backfire: false
    field:
      alpha: 5.0
      beta: 0.07
      temporal_window: 100.0
    topo:
      threshold: 0.30
      radius_base: 0.07
      radius_dynamic: 0.18
networks:
  builder:
    params:
      n: 500
      k: 12
      p: 0.12
events:
  generation:
    exogenous:
      enabled: true
      seed: 606
      time_trigger:
        lambda_rate: 0.08
      attributes:
        intensity:
          min_val: 5.0
        polarity:
          type: uniform
          min: -0.2
          max: 0.5   # skewed positive (corrections)
        lifecycle:
          fast_prob: 0.5
          fast_range: [5, 15]
          slow_range: [20, 60]
    endogenous_threshold:
      enabled: true
      monitor_attribute: opinion_variance
      critical_threshold: 0.40
      grid_resolution: 15
      min_agents_in_cell: 4
      cooldown: 20
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.80
      background_lambda: 0.02   # persistent background rumor rate
      attributes:
        intensity:
          cascade_decay: 0.6
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: chronicle
  parser.theme: epidemic_rumor
  visual.event_timeline: true
  report.title: Public Health Crisis — Rumor Cascade Analysis

# config/themes/radicalization.yaml
#
# Scenario: online radicalization
#
# Key characteristics:
#   - Initial opinions near-normal; gradually collapse toward the extremes
#   - Opinion extremism itself triggers further radicalizing events (positive feedback)
#   - Scale-free network: a few extreme hubs dominate influence
#   - Strong cascade (extreme content spreads virally)
#   - Research focus: radicalization speed, tipping point, de-rad intervention window

_meta:
  label: Online Radicalization
  description: >
    Online community radicalization. Scale-free network with extreme hubs drives
    a positive feedback loop between opinion extremism and event generation.
    Designed to study tipping points and de-radicalization intervention windows.
  scenario: radicalization
  tags: [radicalization, scale_free, online, feedback_loop]

_presets:
  networks.builder:       barabasi_albert
  spatial.distributions:  uniform          # online context; space irrelevant
  engine.interface:       normal           # start near-normal, drift to extremes

engine:
  interface:
    agents:
      num_agents: 300
      opinion_layers: 3
      initial_opinions:
        params:
          mean: 0.5
          std: 0.18
    simulation:
      total_steps: 800
      seed: 404
  maths:
    dynamics:
      epsilon_base: 0.15
      mu_base: 0.25
      alpha_mod: 0.45
      beta_mod: 0.25
      backfire: true
    field:
      alpha: 4.0
      beta: 0.06
      temporal_window: 200.0
    topo:
      threshold: 0.15
      radius_base: 0.08
      radius_dynamic: 0.20
networks:
  builder:
    params:
      n: 300
      m: 3
events:
  generation:
    endogenous_threshold:
      enabled: true
      monitor_attribute: opinion_extremism
      critical_threshold: 0.60
      grid_resolution: 20
      min_agents_in_cell: 3
      cooldown: 40
      attributes:
        intensity:
          base_value: 15.0
          scale_factor: 20.0
        polarity:
          type: dynamic
    exogenous:
      enabled: true
      seed: 404
      time_trigger:
        lambda_rate: 0.10
      attributes:
        intensity:
          min_val: 3.0
        lifecycle:
          fast_prob: 0.85
          fast_range: [2, 6]
          slow_range: [10, 25]
    endogenous_cascade:
      enabled: true
      mu_multiplier: 0.75
      background_lambda: 0.0
    online_resonance:
      enabled: false
      check_interval: 2
      smoothing_window: 5
      convergence_threshold: 0.01
      conflict_threshold: 0.01
      min_community_size: 3
      layer_weights: [1.0, 1.0, 1.0]
      attributes:
        intensity:
          base_value: 4.0
          size_scale: 8.0
        diffusion:
          dispersion_scale: 1.0
          min_sigma: 0.03
          max_sigma: 0.3
        lifecycle:
          type: uniform
          min_sigma: 3.0
          max_sigma: 8.0
_analyse_overrides:
  parser.narrative_mode: diagnostic
  parser.theme: radicalization
  report.title: Online Radicalization Dynamics — Diagnostic Report

# config/themes/radicalization.yaml
#
# Scenario: online radicalization
#
# Key characteristics:
#   - Initial opinions near-normal; gradually collapse toward the extremes
#   - Opinion extremism itself triggers further radicalizing events (positive feedback)
#   - Scale-free network: a few extreme hubs dominate influence
#   - Strong cascade (extreme content spreads virally)
#   - Research focus: radicalization speed, tipping point, de-rad intervention window

_meta:
  label: Online Radicalization
  description: >
    Online community radicalization. Scale-free network with extreme hubs drives
    a positive feedback loop between opinion extremism and event generation.
    Designed to study tipping points and de-radicalization intervention windows.
  scenario: radicalization
  tags: [radicalization, scale_free, online, feedback_loop]

_presets:
  networks.builder:       barabasi_albert
  spatial.distributions:  uniform          # online context; space irrelevant
  engine.interface:       normal           # start near-normal, drift to extremes

_overrides:
  engine.interface.agents.num_agents:        300
  engine.interface.agents.opinion_layers:    3
  engine.interface.agents.initial_opinions.params.mean: 0.5
  engine.interface.agents.initial_opinions.params.std:  0.18

  engine.interface.simulation.total_steps:   800
  engine.interface.simulation.seed:          404

  # dynamics: low tolerance, strong event amplification, backfire enabled
  engine.maths.dynamics.epsilon_base:   0.15
  engine.maths.dynamics.mu_base:        0.25
  engine.maths.dynamics.alpha_mod:      0.45
  engine.maths.dynamics.beta_mod:       0.25
  engine.maths.dynamics.backfire:       true

  engine.maths.field.alpha:             4.0
  engine.maths.field.beta:              0.06
  engine.maths.field.temporal_window:   200.0

  engine.maths.topo.threshold:          0.15
  engine.maths.topo.radius_base:        0.08
  engine.maths.topo.radius_dynamic:     0.20

  networks.builder.params.n:  300
  networks.builder.params.m:  3

  # endogenous threshold: extremism trigger (core mechanism)
  events.generation.endogenous_threshold.enabled:            true
  events.generation.endogenous_threshold.monitor_attribute:  opinion_extremism
  events.generation.endogenous_threshold.critical_threshold: 0.60
  events.generation.endogenous_threshold.grid_resolution:    20
  events.generation.endogenous_threshold.min_agents_in_cell: 3
  events.generation.endogenous_threshold.cooldown:           40
  events.generation.endogenous_threshold.attributes.intensity.base_value:   15.0
  events.generation.endogenous_threshold.attributes.intensity.scale_factor: 20.0
  events.generation.endogenous_threshold.attributes.polarity.type: dynamic

  # exogenous: low-rate background noise (algorithmic feed, etc.)
  events.generation.exogenous.enabled:  true
  events.generation.exogenous.seed:     404
  events.generation.exogenous.time_trigger.lambda_rate: 0.10
  events.generation.exogenous.attributes.intensity.min_val: 3.0
  events.generation.exogenous.attributes.lifecycle.fast_prob: 0.85
  events.generation.exogenous.attributes.lifecycle.fast_range: [2, 6]
  events.generation.exogenous.attributes.lifecycle.slow_range: [10, 25]

  # cascade: strong (viral extreme content)
  events.generation.endogenous_cascade.enabled:           true
  events.generation.endogenous_cascade.mu_multiplier:     0.75
  events.generation.endogenous_cascade.background_lambda: 0.0

_analyse_overrides:
  parser.narrative_mode: diagnostic
  parser.theme: radicalization
  report.title: Online Radicalization Dynamics — Diagnostic Report
